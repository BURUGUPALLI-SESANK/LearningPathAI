<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks - LearningPath AI</title>
    
    <!-- Redirect to login if not authenticated -->
    <script>
        if (!localStorage.getItem('userId')) {
            window.location.href = 'profile.html';
        }
    </script>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --secondary-color: #a855f7;
            --dark-bg: #090d16;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-muted: #a3b3c9;
            --success-color: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--dark-bg) 70%);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 4rem;
        }

        .navbar {
            background: rgba(9, 13, 22, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            font-weight: 600;
            color: #cbd5e1 !important;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary-light) !important;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 30%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            margin-bottom: 2rem;
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
        }

        .card-body {
            padding: 2rem;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--primary-light);
        }

        .task-item.completed {
            opacity: 0.6;
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success-color);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .task-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .task-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .task-meta i {
            color: var(--primary-light);
        }

        .progress-summary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .progress-value {
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .date-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .date-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            color: #cbd5e1;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .date-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-light);
        }

        .date-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-graph-up-arrow"></i> LearningPath AI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="learning-path.html">Learning Path</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="daily-tasks.html">Daily Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-calendar-check"></i> Daily Learning Tasks
            </h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">
                Break your big goals into manageable daily tasks
            </p>
        </div>

        <!-- Progress Summary -->
        <div class="progress-summary">
            <div class="progress-label" style="font-size: 1.1rem; margin-bottom: 0.5rem;">Today's Progress</div>
            <div class="progress-value" id="todayProgress">0/0</div>
            <div style="margin-top: 1rem;">
                <div class="progress" style="height: 12px; background: rgba(255,255,255,0.2); border-radius: 10px;">
                    <div id="progressBar" class="progress-bar" style="width: 0%; background: white; border-radius: 10px;"></div>
                </div>
            </div>
        </div>

        <!-- Date Selector -->
        <div class="date-selector">
            <button class="date-btn active" data-day="0">Today</button>
            <button class="date-btn" data-day="1">Tomorrow</button>
            <button class="date-btn" data-day="2">Day 3</button>
            <button class="date-btn" data-day="3">Day 4</button>
            <button class="date-btn" data-day="4">Day 5</button>
            <button class="date-btn" data-day="5">Day 6</button>
            <button class="date-btn" data-day="6">Day 7</button>
        </div>

        <!-- Generate Tasks Button -->
        <div class="text-center mb-4">
            <button class="btn btn-generate" id="generateTasksBtn">
                <i class="bi bi-stars"></i> Generate 7-Day Task Plan
            </button>
        </div>

        <!-- Tasks Container -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title" id="dayTitle">
                    <i class="bi bi-list-task"></i> Today's Tasks
                </h2>
            </div>
            <div class="card-body">
                <div id="tasksContainer">
                    <div class="empty-state">
                        <i class="bi bi-calendar-check"></i>
                        <h4>No Tasks Yet</h4>
                        <p>Click "Generate 7-Day Task Plan" to create your personalized daily tasks</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Google Analytics Module -->
    <script type="module">
        import { trackDailyTasksGenerated, trackTaskComplete } from './analytics.js';
        
        // Make tracking functions available globally
        window.trackDailyTasksGenerated = trackDailyTasksGenerated;
        window.trackTaskComplete = trackTaskComplete;
    </script>
    
    <!-- Custom JavaScript -->
    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : window.location.origin + '/api';

        let currentDay = 0;
        let allTasks = {};

        // Load tasks from localStorage AND backend
        async function loadTasks() {
            const userId = localStorage.getItem('userId');
            
            // Try loading from backend first
            try {
                const response = await fetch(`${API_BASE}/get-daily-tasks/${userId}`);
                const data = await response.json();
                
                if (data.success && data.dailyTasks) {
                    allTasks = data.dailyTasks.tasks || {};
                    // Also save to localStorage for offline access
                    localStorage.setItem(`dailyTasks_${userId}`, JSON.stringify(allTasks));
                    renderTasks(currentDay);
                    return;
                }
            } catch (error) {
                console.log('Could not load from backend, trying localStorage:', error);
            }
            
            // Fallback to localStorage
            const stored = localStorage.getItem(`dailyTasks_${userId}`);
            if (stored) {
                allTasks = JSON.parse(stored);
                renderTasks(currentDay);
            }
        }

        // Save tasks to localStorage
        function saveTasks() {
            const userId = localStorage.getItem('userId');
            localStorage.setItem(`dailyTasks_${userId}`, JSON.stringify(allTasks));
        }

        // Generate tasks from REAL learning path
        async function generateTasks() {
            const btn = document.getElementById('generateTasksBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Generating...';

            try {
                const userId = localStorage.getItem('userId');
                
                if (!userId) {
                    alert('Please login first!');
                    window.location.href = 'profile.html';
                    return;
                }

                // Fetch REAL learning path from backend
                const response = await fetch(`${API_BASE}/get-learning-path/${userId}`);
                const data = await response.json();

                if (!data.success || !data.learningPath) {
                    alert('Please generate your learning path first!');
                    window.location.href = 'learning-path.html';
                    return;
                }

                const courses = data.learningPath.courses || [];
                
                if (courses.length === 0) {
                    alert('No courses found in your learning path. Please generate it first!');
                    window.location.href = 'learning-path.html';
                    return;
                }

                // Generate 7 days of tasks from REAL courses
                allTasks = {};
                for (let day = 0; day < 7; day++) {
                    allTasks[day] = generateDayTasks(day, courses);
                }

                saveTasks();
                renderTasks(currentDay);
                
                // Track task generation
                const totalTasks = Object.values(allTasks).reduce((sum, dayTasks) => sum + dayTasks.length, 0);
                if (window.trackDailyTasksGenerated) {
                    window.trackDailyTasksGenerated(totalTasks);
                }
                
            } catch (error) {
                console.error('Error generating tasks:', error);
                alert('Failed to generate tasks. Please make sure you have a learning path generated.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-stars"></i> Regenerate Task Plan';
            }
        }

        // Generate tasks for a specific day
        function generateDayTasks(day, courses) {
            const tasks = [];
            const dayNames = ['Today', 'Tomorrow', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'];
            
            // Distribute courses across days
            const courseIndex = day % courses.length;
            const course = courses[courseIndex];

            if (course) {
                tasks.push({
                    id: `task_${day}_1`,
                    title: `Watch ${course.title} - Module ${day + 1}`,
                    description: `Complete one module from ${course.title} on ${course.provider}`,
                    duration: '30-45 min',
                    type: 'video',
                    completed: false
                });

                tasks.push({
                    id: `task_${day}_2`,
                    title: `Practice Exercises`,
                    description: `Complete practice exercises related to ${course.title}`,
                    duration: '20-30 min',
                    type: 'practice',
                    completed: false
                });

                tasks.push({
                    id: `task_${day}_3`,
                    title: `Take Notes`,
                    description: `Summarize key concepts from today's learning`,
                    duration: '15 min',
                    type: 'notes',
                    completed: false
                });

                if (day % 2 === 0) {
                    tasks.push({
                        id: `task_${day}_4`,
                        title: `Quiz Yourself`,
                        description: `Test your understanding with a quick quiz`,
                        duration: '10 min',
                        type: 'quiz',
                        completed: false
                    });
                }
            }

            return tasks;
        }

        // Render tasks for a specific day
        function renderTasks(day) {
            const container = document.getElementById('tasksContainer');
            const dayNames = ['Today', 'Tomorrow', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'];
            document.getElementById('dayTitle').innerHTML = `<i class="bi bi-list-task"></i> ${dayNames[day]}'s Tasks`;

            const tasks = allTasks[day] || [];

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-calendar-check"></i>
                        <h4>No Tasks Yet</h4>
                        <p>Click "Generate 7-Day Task Plan" to create your personalized daily tasks</p>
                    </div>
                `;
                updateProgress(day);
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}" onclick="toggleTask('${task.id}', ${day})">
                    <div class="d-flex align-items-start gap-3">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onclick="event.stopPropagation(); toggleTask('${task.id}', ${day})">
                        <div class="flex-grow-1">
                            <div class="task-title">${task.title}</div>
                            <div class="task-description">${task.description}</div>
                            <div class="task-meta">
                                <span><i class="bi bi-clock"></i> ${task.duration}</span>
                                <span><i class="bi bi-tag"></i> ${task.type}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateProgress(day);
        }

        // Toggle task completion
        function toggleTask(taskId, day) {
            const tasks = allTasks[day];
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks(day);
                
                // Track task completion
                if (task.completed && window.trackTaskComplete) {
                    window.trackTaskComplete(task.title, day);
                }
                
                // Save to backend
                saveProgressToBackend();
            }
        }

        // Save progress to backend
        async function saveProgressToBackend() {
            try {
                const userId = localStorage.getItem('userId');
                if (!userId) return;

                // Calculate overall progress
                let totalTasks = 0;
                let completedTasks = 0;
                
                for (let day = 0; day < 7; day++) {
                    const dayTasks = allTasks[day] || [];
                    totalTasks += dayTasks.length;
                    completedTasks += dayTasks.filter(t => t.completed).length;
                }

                const progressPercentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

                // Send to backend
                await fetch(`${API_BASE}/update-daily-tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        tasks: allTasks,
                        progress: progressPercentage,
                        completedTasks: completedTasks,
                        totalTasks: totalTasks
                    })
                });
            } catch (error) {
                console.error('Error saving progress to backend:', error);
                // Continue anyway - localStorage is the primary storage
            }
        }

        // Update progress display
        function updateProgress(day) {
            const tasks = allTasks[day] || [];
            const completed = tasks.filter(t => t.completed).length;
            const total = tasks.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('todayProgress').textContent = `${completed}/${total}`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
        }

        // Date selector
        document.querySelectorAll('.date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDay = parseInt(btn.dataset.day);
                renderTasks(currentDay);
            });
        });

        // Generate button
        document.getElementById('generateTasksBtn').addEventListener('click', generateTasks);

        // Load tasks on page load
        loadTasks();
    </script>
    
    <!-- Floating AI Tutor Chatbot -->
    <script src="copilot.js"></script>
</body>
</html>
