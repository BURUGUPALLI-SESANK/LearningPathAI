<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Progression - LearningPath AI</title>
    
    <!-- Redirect to login if not authenticated -->
    <script>
        if (!localStorage.getItem('userId')) {
            window.location.href = 'profile.html';
        }
    </script>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --secondary-color: #a855f7;
            --dark-bg: #090d16;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-muted: #a3b3c9;
            --success-color: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--dark-bg) 70%);
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 4rem;
        }

        .navbar {
            background: rgba(9, 13, 22, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            font-weight: 600;
            color: #cbd5e1 !important;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary-light) !important;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            margin-bottom: 2rem;
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
        }

        .card-body {
            padding: 2rem;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .skill-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
        }

        .level-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .level-1 { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .level-2 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .level-3 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .level-4 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .level-5 { background: rgba(99, 102, 241, 0.2); color: #818cf8; }

        .progress-container {
            margin: 1rem 0;
        }

        .progress {
            height: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 10px;
        }

        .roadmap-section {
            margin-top: 1.5rem;
        }

        .roadmap-step {
            background: rgba(99, 102, 241, 0.1);
            border-left: 4px solid var(--primary-color);
            padding: 1rem 1.5rem;
            margin: 0.75rem 0;
            border-radius: 8px;
        }

        .roadmap-step.completed {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: var(--success-color);
            opacity: 0.7;
        }

        .roadmap-step.current {
            background: rgba(99, 102, 241, 0.2);
            border-left-width: 6px;
        }

        .course-recommendation {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 12px;
            padding: 1rem;
            margin: 0.5rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .course-recommendation:hover {
            background: rgba(168, 85, 247, 0.2);
            transform: translateX(5px);
        }

        .btn-level-up {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-level-up:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            color: white;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .next-milestone {
            background: rgba(245, 158, 11, 0.15);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .next-milestone h5 {
            color: #fbbf24;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-graph-up-arrow"></i> LearningPath AI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="assessment.html">Assessment</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="skill-progression.html">Skill Progression</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="learning-path.html">Learning Path</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Page Title -->
        <div class="text-center mb-4">
            <h1 class="text-white mb-2" style="font-weight: 800; font-size: 2.5rem;">
                <i class="bi bi-trophy"></i> Your Skill Progression
            </h1>
            <p class="text-white" style="opacity: 0.9; font-size: 1.1rem;">
                Track your progress and level up your skills
            </p>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid" id="statsGrid">
            <!-- Stats will be inserted here -->
        </div>

        <!-- Skills Progress -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="bi bi-bar-chart-line"></i> Your Skills
                </h2>
            </div>
            <div class="card-body">
                <div id="skillsContainer">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-inbox" style="font-size: 3rem; opacity: 0.3; color: #64748b;"></i>
                        <p class="mt-3" style="color: #94a3b8;">No skills assessed yet. Complete the assessment to get started!</p>
                        <a href="assessment.html" class="btn btn-level-up mt-3">
                            <i class="bi bi-clipboard-check"></i> Take Assessment
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script>
        // Auto-detect API base URL (works for both local and Vercel)
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : window.location.origin + '/api';
        
        console.log('API Base URL:', API_BASE);

        // Level definitions
        const LEVEL_NAMES = {
            1: 'Beginner',
            2: 'Novice',
            3: 'Intermediate',
            4: 'Advanced',
            5: 'Expert'
        };

        const LEVEL_REQUIREMENTS = {
            1: { courses: 0, progress: 0 },
            2: { courses: 2, progress: 40 },
            3: { courses: 4, progress: 60 },
            4: { courses: 6, progress: 80 },
            5: { courses: 8, progress: 95 }
        };

        // Load user data
        async function loadUserData() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'profile.html';
                return;
            }

            try {
                // Load assessment data
                const assessmentData = JSON.parse(localStorage.getItem('assessmentData') || '{}');
                
                if (!assessmentData.skills || assessmentData.skills.length === 0) {
                    return;
                }

                // Load progress data from backend
                const progressResponse = await fetch(`${API_BASE}/dashboard/${userId}`);
                const progressData = await progressResponse.json();

                displayStats(assessmentData, progressData);
                displaySkills(assessmentData.skills, progressData);
                
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // Display stats
        function displayStats(assessment, progress) {
            const totalSkills = assessment.skills?.length || 0;
            const avgLevel = assessment.averageLevel || 0;
            const completedCourses = progress.dashboard?.statistics?.completedCourses || 0;
            const overallProgress = progress.dashboard?.statistics?.overallProgress || 0;

            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalSkills}</div>
                    <div class="stat-label">Skills Tracked</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgLevel.toFixed(1)}</div>
                    <div class="stat-label">Average Level</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${completedCourses}</div>
                    <div class="stat-label">Courses Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${overallProgress}%</div>
                    <div class="stat-label">Overall Progress</div>
                </div>
            `;

            document.getElementById('statsGrid').innerHTML = statsHTML;
        }

        // Display skills with progression
        function displaySkills(skills, progressData) {
            const container = document.getElementById('skillsContainer');
            
            const skillsHTML = skills.map(skill => {
                const currentLevel = skill.level;
                const nextLevel = Math.min(currentLevel + 1, 5);
                const progress = calculateSkillProgress(skill, progressData);
                const canLevelUp = progress >= 100 && currentLevel < 5;

                return `
                    <div class="skill-card">
                        <div class="skill-header">
                            <div class="skill-name">${skill.name}</div>
                            <span class="level-badge level-${currentLevel}">
                                Level ${currentLevel} - ${LEVEL_NAMES[currentLevel]}
                            </span>
                        </div>

                        <div class="progress-container">
                            <div class="d-flex justify-content-between mb-2">
                                <span style="color: #cbd5e1;">Progress to Level ${nextLevel}</span>
                                <span style="color: #ffffff; font-weight: 600;">${Math.min(progress, 100)}%</span>
                            </div>
                            <div class="progress">
                                <div class="progress-bar" style="width: ${Math.min(progress, 100)}%"></div>
                            </div>
                        </div>

                        ${canLevelUp ? `
                            <div class="next-milestone">
                                <h5><i class="bi bi-star-fill"></i> Ready to Level Up!</h5>
                                <p style="color: #cbd5e1; margin-bottom: 1rem;">
                                    You've completed the requirements for Level ${nextLevel}!
                                </p>
                                <button class="btn btn-level-up" onclick="levelUpSkill('${skill.name}', ${currentLevel})">
                                    <i class="bi bi-arrow-up-circle"></i> Level Up to ${LEVEL_NAMES[nextLevel]}
                                </button>
                            </div>
                        ` : ''}

                        <div class="roadmap-section">
                            <h5 style="color: #ffffff; margin-bottom: 1rem;">
                                <i class="bi bi-map"></i> Learning Roadmap
                            </h5>
                            ${generateRoadmap(skill, currentLevel, progress)}
                        </div>

                        <div class="mt-3">
                            <button class="btn btn-primary" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border: none;" onclick="viewSkillCourses('${skill.name}', ${currentLevel})">
                                <i class="bi bi-book"></i> View Recommended Courses
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = skillsHTML;
        }

        // Calculate skill progress
        function calculateSkillProgress(skill, progressData) {
            // This is a simplified calculation
            // In production, you'd track actual course completions per skill
            const coursesCompleted = progressData.dashboard?.statistics?.completedCourses || 0;
            const overallProgress = progressData.dashboard?.statistics?.overallProgress || 0;
            
            // Base progress on overall completion
            return Math.min(overallProgress + (coursesCompleted * 10), 100);
        }

        // Generate roadmap
        function generateRoadmap(skill, currentLevel, progress) {
            const roadmapSteps = [
                { level: 1, title: 'Fundamentals', description: 'Learn the basics and core concepts' },
                { level: 2, title: 'Practice', description: 'Complete beginner projects and exercises' },
                { level: 3, title: 'Intermediate Skills', description: 'Build real-world applications' },
                { level: 4, title: 'Advanced Techniques', description: 'Master complex patterns and best practices' },
                { level: 5, title: 'Expert Mastery', description: 'Contribute to open source and mentor others' }
            ];

            return roadmapSteps.map(step => {
                const isCompleted = step.level < currentLevel;
                const isCurrent = step.level === currentLevel;
                const statusClass = isCompleted ? 'completed' : (isCurrent ? 'current' : '');
                const icon = isCompleted ? 'check-circle-fill' : (isCurrent ? 'arrow-right-circle-fill' : 'circle');

                return `
                    <div class="roadmap-step ${statusClass}">
                        <div class="d-flex align-items-start">
                            <i class="bi bi-${icon} me-3" style="font-size: 1.5rem; color: ${isCompleted ? 'var(--success-color)' : 'var(--primary-light)'};"></i>
                            <div style="flex: 1;">
                                <h6 style="color: #ffffff; margin-bottom: 0.25rem;">
                                    Level ${step.level}: ${step.title}
                                    ${isCompleted ? '<span class="badge bg-success ms-2">Completed</span>' : ''}
                                    ${isCurrent ? '<span class="badge bg-primary ms-2">Current</span>' : ''}
                                </h6>
                                <p style="color: #cbd5e1; margin: 0; font-size: 0.9rem;">${step.description}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Level up skill
        async function levelUpSkill(skillName, currentLevel) {
            const userId = localStorage.getItem('userId');
            const newLevel = currentLevel + 1;

            try {
                // Update in localStorage
                const assessmentData = JSON.parse(localStorage.getItem('assessmentData') || '{}');
                const skillIndex = assessmentData.skills.findIndex(s => s.name === skillName);
                
                if (skillIndex !== -1) {
                    assessmentData.skills[skillIndex].level = newLevel;
                    assessmentData.averageLevel = assessmentData.skills.reduce((sum, s) => sum + s.level, 0) / assessmentData.skills.length;
                    localStorage.setItem('assessmentData', JSON.stringify(assessmentData));

                    // Update on backend
                    await fetch(`${API_BASE}/assessment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: userId,
                            skills: assessmentData.skills
                        })
                    });

                    // Show success message
                    alert(`🎉 Congratulations! ${skillName} leveled up to ${LEVEL_NAMES[newLevel]}!`);

                    // Reload page
                    location.reload();
                }
            } catch (error) {
                console.error('Error leveling up skill:', error);
                alert('Failed to level up skill. Please try again.');
            }
        }

        // View skill courses
        function viewSkillCourses(skillName, level) {
            // Store skill filter and redirect to learning path
            localStorage.setItem('skillFilter', JSON.stringify({ skill: skillName, level: level }));
            window.location.href = 'learning-path.html';
        }

        // Initialize
        loadUserData();
    </script>
</body>
</html>
